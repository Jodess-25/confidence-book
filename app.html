<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Refuge - Confidence Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">💜 Confidence Book</h1>
            <div id="user-badge" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-mono"></div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 pb-24">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-gray-100">
            <h2 class="text-lg font-semibold mb-4">Libérez votre esprit...</h2>
            <textarea id="conf-content" rows="3" class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 mb-4 resize-none" placeholder="Que ressentez-vous aujourd'hui ?"></textarea>
            <div class="flex justify-between items-center">
                <select id="conf-emotion" class="bg-gray-100 border-none rounded-lg text-sm px-3 py-2">
                    <option value="triste">Triste 😔</option>
                    <option value="besoin-aide">Besoin d'aide 🆘</option>
                    <option value="espoir">Espoir ✨</option>
                    <option value="colere">Colère 💢</option>
                </select>
                <button onclick="postConfidence()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-semibold hover:bg-indigo-700 transition">Publier</button>
            </div>
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-10 text-gray-500 italic">Chargement des confidences...</div>
        </div>
    </main>

    <script>
        const userId = localStorage.getItem('confidence_user_id');
        if (!userId) window.location.href = '/index.html';
        document.getElementById('user-badge').textContent = userId;

        // --- LOGIQUE DES INTERACTIONS ---

        function handleLike(btn) {
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.textContent);
            
            if (btn.classList.contains('text-red-500')) {
                btn.classList.remove('text-red-500');
                countSpan.textContent = count - 1;
            } else {
                btn.classList.add('text-red-500');
                countSpan.textContent = count + 1;
            }
        }

        function toggleComments(confId) {
            const section = document.getElementById(`comments-${confId}`);
            section.classList.toggle('hidden');
        }

        function addComment(confId) {
            const input = document.getElementById(`input-${confId}`);
            const list = document.getElementById(`list-${confId}`);
            const countLabel = document.getElementById(`msg-count-${confId}`);

            if (!input.value.trim()) return;

            const newComment = document.createElement('div');
            newComment.className = "bg-gray-50 p-3 rounded-xl text-sm mb-2 fade-in";
            newComment.innerHTML = `<span class="font-bold text-indigo-600">Anonyme:</span> ${input.value}`;
            
            list.appendChild(newComment);
            input.value = "";
            
            // Update count
            let currentCount = parseInt(countLabel.textContent);
            countLabel.textContent = currentCount + 1;
        }

        // --- SIMULATION DU FLUX ---

        setTimeout(() => {
            const feed = document.getElementById('feed');
            const confId = "123"; // ID fictif
            
            feed.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded uppercase">Triste</span>
                            <span class="text-gray-400 text-xs">À l'instant</span>
                        </div>
                        <p class="text-gray-800 leading-relaxed">Parfois, j'ai l'impression que personne ne comprend vraiment ce que je traverse...</p>
                        
                        <div class="mt-4 pt-4 border-t border-gray-50 flex gap-6">
                            <button onclick="handleLike(this)" class="flex items-center gap-1 text-gray-400 hover:text-red-500 transition">
                                <span>❤️</span> <span class="count text-sm">12</span>
                            </button>
                            <button onclick="toggleComments('${confId}')" class="flex items-center gap-1 text-gray-400 hover:text-indigo-600 transition">
                                <span>💬</span> <span id="msg-count-${confId}" class="text-sm">0</span>
                            </button>
                        </div>
                    </div>

                    <div id="comments-${confId}" class="hidden bg-gray-50/50 p-6 border-t border-gray-50">
                        <div id="list-${confId}" class="mb-4">
                            </div>
                        <div class="flex gap-2">
                            <input id="input-${confId}" type="text" placeholder="Répondre avec bienveillance..." 
                                   class="flex-1 bg-white border-none rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500">
                            <button onclick="addComment('${confId}')" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-semibold">Envoyer</button>
                        </div>
                    </div>
                </div>
            `;
        }, 800);

        async function postConfidence() {
            const content = document.getElementById('conf-content').value;
            if (!content.trim()) return alert("Le message est vide");
            alert("Confidence envoyée !");
            document.getElementById('conf-content').value = "";
        }
    </script>
</body>
</html>
