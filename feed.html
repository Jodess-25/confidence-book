<!DOCTYPE html>
<html lang="fr" class="theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fil d'actualité - Confidence Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scroll-track); }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
        
        /* Theme Variables */
        .theme-light {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --scroll-track: #f1f1f1;
            --scroll-thumb: #667eea;
        }
        
        .theme-dark {
            --bg: #111827;
            --surface: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --scroll-track: #1f2937;
            --scroll-thumb: #60a5fa;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text-primary);
        }
        
        .bg-surface { background-color: var(--surface); }
        .text-primary { color: var(--text-primary); }
        .text-secondary { color: var(--text-secondary); }
        .border-theme { border-color: var(--border); }
        
        /* Reactions Modal (Long Press) */
        .reactions-modal {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
        }
        
        .reactions-modal.active {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            pointer-events: all;
        }
        
        /* Reaction Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .reaction-btn:hover .reaction-icon {
            animation: bounce 0.5s ease;
        }
        
        /* Donation Toast */
        .donation-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .donation-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    
    <!-- Header -->
    <header class="bg-surface border-b border-theme sticky top-0 z-20 shadow-sm">
        <div class="container mx-auto max-w-7xl px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold text-purple-600">Confidence Book</h1>
            </div>
            
            <nav class="flex items-center space-x-4">
                <a href="/feed" class="text-secondary hover:text-primary transition">Accueil</a>
                <a href="/profile" class="text-secondary hover:text-primary transition">Profil</a>
                <a href="/settings" class="text-secondary hover:text-primary transition">⚙️</a>
                <button onclick="showModal('post-modal')" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:shadow-lg transition">
                    ✨ Publier
                </button>
            </nav>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="container mx-auto max-w-4xl px-4 py-8">
        
        <!-- Chapitres Émotionnels -->
        <div class="mb-8 bg-surface rounded-2xl shadow-sm p-4 border border-theme">
            <h2 class="text-sm font-semibold text-secondary uppercase mb-3">Chapitres Émotionnels</h2>
            <div class="flex flex-wrap gap-2" id="chapters-list">
                <button onclick="selectChapter('all')" data-chapter="all" class="chapter-btn px-4 py-2 rounded-full text-sm font-medium bg-purple-100 text-purple-700 transition">
                    🌐 Tous
                </button>
            </div>
        </div>
        
        <!-- Feed -->
        <div id="confidences-list" class="space-y-6">
            <div class="text-center text-secondary py-12">
                <p>Chargement...</p>
            </div>
        </div>
        
    </div>
    
    <!-- Modal Création Confidence -->
    <div id="post-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50">
        <div class="bg-surface rounded-2xl shadow-2xl w-full max-w-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-primary">Écrire une confidence</h2>
                <button onclick="hideModal('post-modal')" class="text-secondary hover:text-primary transition">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <textarea id="confidence-text" rows="8" placeholder="Partagez votre histoire, votre peur, votre espoir..." class="w-full p-4 rounded-lg border-2 border-theme bg-surface text-primary focus:border-purple-600 focus:outline-none text-lg"></textarea>
            
            <div class="mt-6">
                <label class="block text-sm font-medium text-secondary mb-2">Tonalité émotionnelle :</label>
                <div class="flex flex-wrap gap-2" id="emotion-buttons"></div>
            </div>
            
            <div id="moderation-message" class="hidden mt-4 p-4 rounded-lg bg-yellow-50 text-yellow-800"></div>
            
            <div class="mt-6 flex justify-end space-x-4">
                <button onclick="hideModal('post-modal')" class="px-6 py-2 text-secondary hover:text-primary transition">Annuler</button>
                <button onclick="publishConfidence()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium rounded-lg hover:shadow-lg transition">
                    Publier
                </button>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="bg-surface border-t border-theme mt-12 py-8">
        <div class="container mx-auto max-w-7xl px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <h3 class="font-bold text-primary mb-3">Confidence Book</h3>
                    <p class="text-sm text-secondary">Votre refuge émotionnel anonyme</p>
                </div>
                
                <div>
                    <h3 class="font-bold text-primary mb-3">Contact</h3>
                    <div class="space-y-2 text-sm text-secondary">
                        <a href="https://wa.me/22969056283" target="_blank" class="block hover:text-primary">📱 WhatsApp</a>
                        <a href="mailto:nexusstudio100@gmail.com" class="block hover:text-primary">📧 Email Support</a>
                    </div>
                </div>
                
                <div>
                    <h3 class="font-bold text-primary mb-3">Aide d'urgence</h3>
                    <div class="space-y-1 text-sm text-secondary">
                        <p>🇫🇷 France: 3114</p>
                        <p>🇨🇦 Canada: 1-833-456-4566</p>
                        <p>🇧🇪 Belgique: 0800 32 123</p>
                        <a href="/support" class="block text-purple-600 hover:underline mt-2">💙 Soutenir le projet</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    
    <script>
        // CONFIGURATION
        const CHAPTERS = [
            { id: 'ruptures', emoji: '💔', name: 'Ruptures & Relations' },
            { id: 'isolement', emoji: '😔', name: 'Isolement & Tristesse' },
            { id: 'traumas', emoji: '🔥', name: 'Traumas & Expériences' },
            { id: 'stress', emoji: '🧠', name: 'Stress & Santé Mentale' },
            { id: 'spiritualite', emoji: '🪞', name: 'Spiritualité & Quête' },
            { id: 'espoir', emoji: '🤝', name: 'Espoir & Reconstruction' }
        ];
        
        const REACTIONS = [
            { id: 'soutiens', emoji: '🤝', label: 'Je te soutiens', color: 'blue' },
            { id: 'espoir', emoji: '🔥', label: 'Garde espoir', color: 'orange' },
            { id: 'compatis', emoji: '🤜🤛', label: 'Je compatis', color: 'purple' },
            { id: 'pas_seul', emoji: '🫂', label: 'T\'es pas seul', color: 'teal' },
            { id: 'courage', emoji: '🙌', label: 'Courage', color: 'yellow' },
            { id: 'triste', emoji: '💔', label: 'C\'est triste', color: 'red' }
        ];
        
        let currentUserId = localStorage.getItem('user_id');
        let currentChapter = 'all';
        let currentEmotion = null;
        let lastDonationPrompt = 0;
        
        // INIT
        if (!currentUserId) {
            window.location.href = '/';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            renderChapters();
            renderEmotionButtons();
            loadConfidences();
            startDonationTimer();
        });
        
        // CHAPITRES
        function renderChapters() {
            const container = document.getElementById('chapters-list');
            const html = CHAPTERS.map(ch => `
                <button onclick="selectChapter('${ch.id}')" data-chapter="${ch.id}" class="chapter-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-gray-200 text-secondary hover:border-purple-600 hover:text-purple-600 transition">
                    ${ch.emoji} ${ch.name}
                </button>
            `).join('');
            
            container.innerHTML += html;
        }
        
        function selectChapter(chapterId) {
            currentChapter = chapterId;
            
            document.querySelectorAll('.chapter-btn').forEach(btn => {
                if (btn.dataset.chapter === chapterId) {
                    btn.classList.add('bg-purple-100', 'text-purple-700', 'border-purple-600');
                    btn.classList.remove('border-gray-200', 'text-secondary');
                } else {
                    btn.classList.remove('bg-purple-100', 'text-purple-700', 'border-purple-600');
                    btn.classList.add('border-gray-200', 'text-secondary');
                }
            });
            
            loadConfidences();
        }
        
        // ÉMOTIONS
        function renderEmotionButtons() {
            const container = document.getElementById('emotion-buttons');
            const html = CHAPTERS.map(ch => `
                <button onclick="selectEmotion('${ch.id}')" data-emotion="${ch.id}" class="emotion-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-gray-300 text-secondary hover:border-purple-600 transition">
                    ${ch.emoji} ${ch.name.split('&')[0].trim()}
                </button>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function selectEmotion(emotionId) {
            currentEmotion = emotionId;
            
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                if (btn.dataset.emotion === emotionId) {
                    btn.classList.add('border-purple-600', 'bg-purple-100', 'text-purple-700');
                } else {
                    btn.classList.remove('border-purple-600', 'bg-purple-100', 'text-purple-700');
                }
            });
        }
        
        // CONFIDENCES
        async function loadConfidences() {
            try {
                const response = await fetch(`/api/confidences?chapter=${currentChapter}`);
                const result = await response.json();
                
                if (result.success) {
                    renderConfidences(result.data);
                }
            } catch (error) {
                console.error('Error loading confidences:', error);
            }
        }
        
        function renderConfidences(confidences) {
            const container = document.getElementById('confidences-list');
            
            if (confidences.length === 0) {
                container.innerHTML = '<div class="text-center text-secondary py-12"><p>Aucune confidence pour le moment. Soyez le premier à partager.</p></div>';
                return;
            }
            
            const html = confidences.map(conf => renderConfidence(conf)).join('');
            container.innerHTML = html;
        }
        
        function renderConfidence(conf) {
            const chapter = CHAPTERS.find(ch => ch.id === conf.emotion) || CHAPTERS[0];
            const isOwner = conf.user_id === currentUserId;
            
            const ownerActions = isOwner ? `
                <div class="flex gap-2 ml-auto">
                    <button onclick="editConfidence('${conf.id}')" class="text-sm text-blue-600 hover:underline">✏️</button>
                    <button onclick="deleteConfidence('${conf.id}')" class="text-sm text-red-600 hover:underline">🗑️</button>
                </div>
            ` : '';
            
            return `
                <article class="bg-surface rounded-2xl shadow-sm border border-theme overflow-hidden">
                    <div class="p-5 flex items-center space-x-3 border-b border-theme">
                        <div class="w-11 h-11 rounded-full bg-${chapter.id}-100 flex items-center justify-center">
                            <span class="text-2xl">${chapter.emoji}</span>
                        </div>
                        <div class="flex-1">
                            <p class="text-xs text-secondary">${chapter.name}</p>
                            <p class="text-xs text-secondary">${new Date(conf.created_at).toLocaleDateString('fr-FR')}</p>
                        </div>
                        ${ownerActions}
                    </div>
                    
                    <div class="p-5">
                        <p class="text-lg leading-relaxed" id="conf-content-${conf.id}">${escapeHtml(conf.content)}</p>
                    </div>
                    
                    <div class="p-5 border-t border-theme">
                        <div class="flex flex-wrap gap-2">
                            ${REACTIONS.map(r => `
                                <button onclick="react('${conf.id}', '${r.id}')" class="px-3 py-2 rounded-full text-sm border border-theme hover:border-${r.color}-500 transition">
                                    ${r.emoji} ${conf.reactions[r.id] || 0}
                                </button>
                            `).join('')}
                        </div>
                        
                        <button onclick="window.location.href='/confidence/${conf.id}'" class="mt-4 w-full text-sm text-secondary hover:text-primary transition text-left">
                            💬 ${conf.responses?.length || 0} réponse(s) → Voir la conversation
                        </button>
                    </div>
                </article>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // PUBLISH
        async function publishConfidence() {
            const text = document.getElementById('confidence-text').value.trim();
            
            if (!text || text.length < 10) {
                alert('La confidence doit contenir au moins 10 caractères');
                return;
            }
            
            if (!currentEmotion) {
                alert('Veuillez choisir une tonalité émotionnelle');
                return;
            }
            
            try {
                const response = await fetch('/api/confidences', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': currentUserId
                    },
                    body: JSON.stringify({
                        content: text,
                        emotion: currentEmotion
                    })
                });
                
                const result = await response.json();
                
                if (result.success && result.published) {
                    document.getElementById('confidence-text').value = '';
                    currentEmotion = null;
                    document.querySelectorAll('.emotion-btn').forEach(btn => {
                        btn.classList.remove('border-purple-600', 'bg-purple-100', 'text-purple-700');
                    });
                    
                    hideModal('post-modal');
                    await loadConfidences();
                } else {
                    const msgEl = document.getElementById('moderation-message');
                    msgEl.classList.remove('hidden');
                    msgEl.textContent = result.moderationMessage || result.message;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Erreur lors de la publication');
            }
        }
        
        // REACT
        async function react(confidenceId, reactionType) {
            try {
                await fetch('/api/reactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': currentUserId
                    },
                    body: JSON.stringify({ confidenceId, reactionType })
                });
                
                await loadConfidences();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // DELETE
        async function deleteConfidence(id) {
            if (!confirm('Supprimer cette confidence ?')) return;
            
            try {
                await fetch(`/api/confidences/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-User-Id': currentUserId }
                });
                
                await loadConfidences();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // EDIT
        async function editConfidence(id) {
            const contentEl = document.getElementById(`conf-content-${id}`);
            const currentContent = contentEl.textContent;
            
            // Ouvrir modal avec contenu pré-rempli
            document.getElementById('confidence-text').value = currentContent;
            showModal('post-modal');
            
            // Changer le comportement du bouton publier
            const publishBtn = document.querySelector('#post-modal button[onclick="publishConfidence()"]');
            publishBtn.textContent = 'Mettre à jour';
            publishBtn.onclick = async () => {
                const newContent = document.getElementById('confidence-text').value.trim();
                
                try {
                    await fetch(`/api/confidences/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-User-Id': currentUserId
                        },
                        body: JSON.stringify({ content: newContent })
                    });
                    
                    hideModal('post-modal');
                    await loadConfidences();
                    
                    // Restaurer le bouton
                    publishBtn.textContent = 'Publier';
                    publishBtn.onclick = publishConfidence;
                } catch (error) {
                    console.error('Error:', error);
                }
            };
        }
        
        // DONATION TOAST
        function startDonationTimer() {
            setInterval(() => {
                const now = Date.now();
                
                if (now - lastDonationPrompt > 15 * 60 * 1000) {
                    showDonationToast();
                    lastDonationPrompt = now;
                }
            }, 60000);
        }
        
        function showDonationToast() {
            const toast = document.createElement('div');
            toast.className = 'donation-toast';
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-3xl">💙</span>
                    <div>
                        <strong>Aimez-vous Confidence Book?</strong>
                        <p class="text-sm opacity-90">Soutenez-nous pour rester gratuit</p>
                    </div>
                    <button onclick="window.location.href='/support'" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-medium ml-4">Faire un don</button>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-white opacity-70 hover:opacity-100">✕</button>
                </div>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
        
        // MODALS
        function showModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }
        
        function hideModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
    
</body>
</html>
